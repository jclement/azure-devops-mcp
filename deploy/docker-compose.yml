# Single-container deployment of the Azure DevOps MCP wrapper.
#
# Put this behind a TLS-terminating reverse proxy / tunnel that sets
# X-Forwarded-Proto and X-Forwarded-Host (passkeys require a secure origin).
# Registration is OPEN — anyone who can reach the URL can create an account, so
# the network boundary (VPN / private ingress / Cloudflare Access) is the real
# perimeter. Restrict who can reach this service.
services:
  app:
    # Published by CI to GHCR. To build locally instead, run with --build.
    image: ghcr.io/jclement/azure-devops-mcp:latest
    build:
      context: ..
      args:
        # Pin the upstream Microsoft MCP version for a reproducible image.
        ADO_MCP_VERSION: latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 32-byte key that encrypts every stored PAT. REQUIRED in production.
      # Generate: openssl rand -base64 32 — and BACK IT UP. Losing it makes all
      # stored PATs unrecoverable.
      MASTER_KEY: "${MASTER_KEY:?set MASTER_KEY in .env (openssl rand -base64 32)}"
      # Optionally hard-pin the public origin instead of deriving from proxy headers:
      # PUBLIC_URL: "https://ado-mcp.example.com"
      #
      # Newer @azure-devops/mcp versions are auto-adopted in the background by
      # default (needs npm access). Set to "0" to pin the running version instead.
      ADO_MCP_AUTO_UPDATE: "1"
      ADO_MCP_DIST_TAG: "latest"
    volumes:
      - ado-mcp-data:/data

volumes:
  ado-mcp-data:
