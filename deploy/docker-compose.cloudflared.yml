# Azure DevOps MCP exposed through a Cloudflare Tunnel.
#
# 1. In Cloudflare Zero Trust, create a tunnel and point its public hostname
#    (e.g. ado-mcp.example.com) at http://app:3000.
# 2. Copy this file to docker-compose.yml and create a .env next to it:
#      MASTER_KEY=...                 # openssl rand -base64 32 — and BACK IT UP
#      CLOUDFLARED_TUNNEL_TOKEN=eyJ...
# 3. docker compose up -d
# 4. Open https://<your-host>/register to create your account, then add an
#    Azure DevOps connection (organization + PAT).
#
# Registration is OPEN — put a Cloudflare Access policy in front of the hostname
# so only your people can reach it. PUBLIC_URL is optional: the app derives its
# public origin from cloudflared's forwarded headers; set it to hard-pin the host.

services:
  app:
    image: ghcr.io/jclement/azure-devops-mcp:latest
    # To build from a local checkout instead of pulling the published image,
    # uncomment this and run `docker compose up --build`:
    # build: { context: .., dockerfile: Dockerfile }
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      # Encrypts every stored PAT at rest. Required. Losing it = all PATs unrecoverable.
      MASTER_KEY: "${MASTER_KEY:?set MASTER_KEY in .env (openssl rand -base64 32)}"
      # PUBLIC_URL: https://ado-mcp.example.com   # optional override
    volumes:
      - ./data:/data

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
